apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
  namespace: cert-manager
spec:
  acme:
    # The ACME server URL
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address used for ACME registration
    email: me@tobiasmichael.de
    # Name of a secret used to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt
    # Enable the HTTP-01 challenge provider
    solvers:
      - dns01:
          # Follow CNAMEs so _acme-challenge records for domains not hosted on
          # DigitalOcean (e.g. tobiasmichael.de, tm28.de, selinaeffner.de) can be
          # delegated into the DO-hosted tmem.de zone for validation.
          cnameStrategy: Follow
          digitalocean:
            tokenSecretRef:
              name: digitalocean-dns
              key: access-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http
  namespace: cert-manager
spec:
  acme:
    # The ACME server URL
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email address used for ACME registration
    email: me@tobiasmichael.de
    # Name of a secret used to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-http
    # Enable the HTTP-01 challenge provider
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-games-k8s
  namespace: telegram-games-k8s
---
# Cluster-wide because game servers live in their own namespaces (minecraft,
# satisfactory, ...). The bot lists managed workloads everywhere and triggers a
# rollout restart by patching the pod template.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telegram-games-k8s
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telegram-games-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: telegram-games-k8s
subjects:
  - kind: ServiceAccount
    name: telegram-games-k8s
    namespace: telegram-games-k8s

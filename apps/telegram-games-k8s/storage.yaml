---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: telegram-games-k8s-data-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/internal/telegram-games-k8s/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - homeserver
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: telegram-games-k8s-data-pvc
  namespace: telegram-games-k8s
spec:
  storageClassName: local-storage
  volumeName: telegram-games-k8s-data-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

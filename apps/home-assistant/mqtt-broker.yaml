---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-3.5.1/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eclipse-mosquitto
  namespace: home-assistant
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 5m
  releaseName: mosquitto
  targetNamespace: home-assistant
  values:
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          mosquitto:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22
            env:
              TZ: Europe/Berlin
              LOG_LEVEL: "info"
    service:
      main:
        controller: main
        type: LoadBalancer
        # Share Traefik's MetalLB IP — port 1883 doesn't collide with 80/443.
        # ETP=Cluster (not Local) because shared-IP services with Local ETP
        # must have identical pod selectors, which we don't share with Traefik.
        # Trade-off: broker sees the node IP instead of the real client IP.
        externalTrafficPolicy: Cluster
        annotations:
          metallb.io/allow-shared-ip: shared-lb
        ports:
          other:
            port: 1883
    persistence:
      data:
        enabled: true
        existingClaim: mqtt-broker-pvc
        globalMounts:
          - path: /mosquitto/data
      config:
        enabled: true
        type: configMap
        name: mosquitto-config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sessionhoster
  namespace: *app
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 5m
  releaseName: *app
  targetNamespace: *app
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
    controllers:
      main:
        strategy: "RollingUpdate"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          frontend:
            image:
              repository: ghcr.io/tobimichael96/calendar-helper-frontend
              tag: latest
            env:
              TZ: Europe/Berlin
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                cpu: 50m
                memory: 128Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health.json
                    port: 3000
                  initialDelaySeconds: 3
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health.json
                    port: 3000
                  initialDelaySeconds: 2
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 2
          backend:
            image:
              repository: ghcr.io/tobimichael96/calendar-helper-backend
              tag: latest
            env:
              TZ: Europe/Berlin
              PUBLIC_BASE_URL: https://sessionhoster.com
              REDIS_URL: redis://sessionhoster-redis:6379/0
            envFrom:
              - configMapRef:
                  name: default
              - secretRef:
                  name: default
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                cpu: 100m
                memory: 256Mi
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 2
                  periodSeconds: 3
                  timeoutSeconds: 3
                  failureThreshold: 10
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
      redis:
        containers:
          redis:
            image:
              repository: redis
              tag: 8-alpine
            args: ["--save", "", "--appendonly", "no"]
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 64Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["redis-cli", "ping"]
                  initialDelaySeconds: 5
                  periodSeconds: 10
    service:
      frontend:
        controller: main
        ports:
          http:
            port: 3000
      backend:
        controller: main
        ports:
          http:
            port: 8000
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
    ingress:
      frontend:
        className: "traefik"
        annotations:
          kubernetes.io/tls-acme: "true"
          traefik.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: "letsencrypt"
          nginx.org/websocket-services: "frontend"
        hosts:
          - host: &host sessionhoster.com
            paths:
              - path: /api/
                pathType: Prefix
                service:
                  identifier: backend
                  port: http
              - path: /
                pathType: Prefix
                service:
                  identifier: frontend
                  port: http
        tls:
          - hosts:
              - *host
            secretName: sessionhoster-tls
    persistence:
      data:
        existingClaim: sessionhoster-pvc
        advancedMounts:
          main:
            backend:
              - path: /data
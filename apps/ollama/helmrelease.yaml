---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
  namespace: *app
spec:
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 5m
  releaseName: *app
  targetNamespace: *app
  values:
    defaultPodOptions:
      runtimeClassName: "nvidia-cdi"
    controllers:
      ollama:
        strategy: "Recreate"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.23.2
            env:
              TZ: Europe/Berlin
              OLLAMA_HOST: "0.0.0.0:11434"
              OLLAMA_MODELS: /models
              OLLAMA_KEEP_ALIVE: "5m"
              OLLAMA_MAX_LOADED_MODELS: "1"
              OLLAMA_NUM_PARALLEL: "1"
              OLLAMA_FLASH_ATTENTION: "1"
              NVIDIA_VISIBLE_DEVICES: "all"
              NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: 4000m
                memory: 8Gi
                nvidia.com/gpu: 1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: false
    service:
      app:
        controller: ollama
        ports:
          http:
            port: 11434
    ingress:
      app:
        enabled: true
        className: "traefik"
        annotations:
          kubernetes.io/tls-acme: "true"
          traefik.ingress.kubernetes.io/ssl-redirect: "true"
          cert-manager.io/cluster-issuer: "letsencrypt"
          traefik.ingress.kubernetes.io/router.middlewares: "kube-system-internal-only@kubernetescrd"
        hosts:
          - host: &host ollama.internal.tmem.de
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: ollama-tls
    persistence:
      models:
        enabled: true
        existingClaim: ollama-models-pvc
        globalMounts:
          - path: /models

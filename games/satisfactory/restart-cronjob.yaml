---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: satisfactory-restart
  namespace: satisfactory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: satisfactory-restart
  namespace: satisfactory
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: satisfactory-restart
  namespace: satisfactory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: satisfactory-restart
subjects:
  - kind: ServiceAccount
    name: satisfactory-restart
    namespace: satisfactory
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: satisfactory-restart
  namespace: satisfactory
spec:
  schedule: "0 4 * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: satisfactory-restart
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: registry.k8s.io/kubectl:v1.36.3
              args:
                - rollout
                - restart
                - deployment/satisfactory
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app satisfactory
  namespace: *app
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 5m
  releaseName: *app
  targetNamespace: *app
  values:
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    controllers:
      main:
        labels:
          # Discoverable by the telegram-games-k8s bot.
          games.telegram-bot/managed: "true"
          games.telegram-bot/name: Satisfactory
        strategy: "Recreate"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-certs:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - "cp /tls-secret/tls.crt /certs/cert_chain.pem && cp /tls-secret/tls.key /certs/private_key.pem && chown 1000:1000 /certs/cert_chain.pem /certs/private_key.pem"
        containers:
          app:
            image:
              repository: wolveix/satisfactory-server
              tag: latest
            env:
              MAXPLAYERS: "3"
              PUID: 1000
              PGID: 1000
              STEAMBETA: "false"
              AUTOPAUSE: "true"
            resources:
              requests:
                memory: 4Gi
              limits:
                memory: 8Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - /home/steam/healthcheck.sh
                  initialDelaySeconds: 300
                  periodSeconds: 30
                  failureThreshold: 3
    service:
      app:
        controller: main
        type: ClusterIP
        ports:
          game:
            port: 7777
            protocol: UDP
          beacon:
            port: 8888
            protocol: TCP
    persistence:
      config:
        existingClaim: satisfactory-pvc
        globalMounts:
          - path: /config
      tls-secret:
        type: secret
        name: satisfactory-tls
        advancedMounts:
          main:
            copy-certs:
              - path: /tls-secret
      certs:
        type: emptyDir
        advancedMounts:
          main:
            copy-certs:
              - path: /certs
            app:
              - path: /config/gamefiles/FactoryGame/Certificates
